name: Publish to npm

# Triggers on a version tag push (e.g. `git tag v0.2.1 && git push origin v0.2.1`).
# The published package powers the Claude Code plugin install path:
# .claude-plugin/marketplace.json points at {source: "npm", package: "skillogy"},
# so end users get the bundled dist/ from the npm registry — no git clone of
# pre-built artifacts, no release branch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Verify marketplace.json version matches tag
        run: |
          MKT_VERSION=$(node -p "require('./.claude-plugin/marketplace.json').plugins[0].source.version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MKT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::marketplace.json source.version ($MKT_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Publish (prepublishOnly runs lint + test + build)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
