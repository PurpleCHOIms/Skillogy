services:
  neo4j:
    image: neo4j:5-community
    container_name: skillogy-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-skillrouter}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=512M
    volumes:
      - skillogy_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $$NEO4J_AUTH 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  skillogy_neo4j_data:
